name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  release:
    needs: verify
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            name: windows-x64-installer
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis,msi --config src-tauri/tauri.conf.json
            upload_plain_binary: false
            asset_pattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          - os: windows-latest
            name: windows-x64-portable
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --no-bundle --config src-tauri/tauri.conf.json
            upload_plain_binary: true
            asset_pattern: "[name]_[version]_[platform]_[arch]_portable[ext]"
          - os: windows-latest
            name: windows-x86-installer
            target: i686-pc-windows-msvc
            args: --target i686-pc-windows-msvc --bundles nsis,msi --config src-tauri/tauri.conf.json
            upload_plain_binary: false
            asset_pattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          - os: windows-latest
            name: windows-x86-portable
            target: i686-pc-windows-msvc
            args: --target i686-pc-windows-msvc --no-bundle --config src-tauri/tauri.conf.json
            upload_plain_binary: true
            asset_pattern: "[name]_[version]_[platform]_[arch]_portable[ext]"
          - os: windows-latest
            name: windows-arm64-installer
            target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --bundles nsis,msi --config src-tauri/tauri.conf.json
            upload_plain_binary: false
            asset_pattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          - os: windows-latest
            name: windows-arm64-portable
            target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --no-bundle --config src-tauri/tauri.conf.json
            upload_plain_binary: true
            asset_pattern: "[name]_[version]_[platform]_[arch]_portable[ext]"
          - os: macos-latest
            name: macos-arm64-dmg
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg --config src-tauri/tauri.conf.json
            upload_plain_binary: false
            asset_pattern: "[name]_[version]_[platform]_[arch][ext]"
          - os: macos-latest
            name: macos-x64-dmg
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg --config src-tauri/tauri.conf.json
            upload_plain_binary: false
            asset_pattern: "[name]_[version]_[platform]_[arch][ext]"
          - os: ubuntu-22.04
            name: linux-x64
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles appimage,deb --config src-tauri/tauri.conf.json
            upload_plain_binary: false
            asset_pattern: "[name]_[version]_[platform]_[arch][ext]"

    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm ci

      - name: Build and publish ${{ matrix.name }}
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "syncFile ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          uploadPlainBinary: ${{ matrix.upload_plain_binary }}
          releaseAssetNamePattern: ${{ matrix.asset_pattern }}
